spring.application.name=dynamic-pricing-system

#MySQL Database connection
spring.datasource.url=jdbc:mysql://localhost:3306/pricingdb?useSSL=false&serverTimeZone=UTC
spring.datasource.username=dps_user
spring.datasource.password=dps_pass123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.physical_naming_strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
spring.task.scheduling.enabled=true

# JPA/ Hibernate Settings for development
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.format_sql=true

# JPA / Hibernate Settings for production
#spring.jpa.hibernate.ddl-auto=none

# App settings
pricing.alert.threshold=0.10
pricing.scheduler.interval=3600000
pricing.alert.drop.threshold=0.05
# Spring Boot thread pool
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=MyAsyncThread-

